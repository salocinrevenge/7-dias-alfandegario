[DEPENDENCIES]
; Never bundle the local virtualenv: it contains x86_64 native .so extensions
; (cffi, raylib) that the browser tries to load as WASM and fails with
; "need to see wasm magic number". pygbag fetches the proper WASM raylib from
; its CDN when it sees `import pyray`. uv names the venv ".venv", which is not
; in pygbag's built-in ignore list, so we add it explicitly (leading slash so
; subfolders are skipped too).
ignoreDirs = ["/.venv"]
; The desktop .mp3 music is never loaded on web (load_sounds uses the smaller
; *-pygbag.ogg encodes when IS_WEB); keep them out of the download.
ignoreFiles = ["menu-music.mp3", "gameplay-music.mp3", "derrota-music.mp3", "vitoria-music.mp3"]
